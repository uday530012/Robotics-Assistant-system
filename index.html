<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robotics Assistant Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #212121; color: #ececf1; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Added a nice header */
        #header { background: #343541; padding: 15px 20px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #444; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { padding: 15px 20px; border-radius: 8px; max-width: 85%; line-height: 1.6; }
        .user { background: #343541; align-self: flex-end; }
        .assistant { background: #444654; align-self: flex-start; width: 100%; }
        
        /* Markdown formatting styles */
        .assistant pre { background: #2d2d2d; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace; }
        .assistant code { background: #2d2d2d; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        
        #input-container { padding: 20px; background: #343541; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border: none; border-radius: 8px; background: #40414f; color: #fff; font-size: 16px; outline: none; }
        
        button { padding: 14px 20px; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-send { background: #10a37f; }
        .btn-send:hover { background: #1a7f64; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div id="header">🤖 Robotics Assistant System</div>
    
    <div id="chat-container"></div>
    
    <div id="input-container">
        <button class="btn-clear" onclick="clearChat()">Clear</button>
        <input type="text" id="user-input" placeholder="Ask about SCARA, inverse kinematics, or sensor pins..." autocomplete="off">
        <button class="btn-send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        function clearChat() {
            document.getElementById('chat-container').innerHTML = '';
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const query = inputField.value.trim();
            if (!query) return;

            inputField.value = '';
            const container = document.getElementById('chat-container');

            // Append User Message
            container.innerHTML += `<div class="message user">${query}</div>`;
            
            // Prepare Assistant Message Holder
            const assistantMessageDiv = document.createElement('div');
            assistantMessageDiv.className = 'message assistant';
            assistantMessageDiv.innerHTML = '<i>Thinking...</i>';
            container.appendChild(assistantMessageDiv);
            container.scrollTop = container.scrollHeight;

            try {
                // Post to FastAPI server
                const response = await fetch('http://127.0.0.1:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = ""; // Hold the complete text to parse markdown

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunkText = decoder.decode(value, { stream: true });
                    fullText += chunkText;
                    
                    // Parse the accumulated text as Markdown
                    assistantMessageDiv.innerHTML = marked.parse(fullText); 
                    container.scrollTop = container.scrollHeight;
                }
            } catch (error) {
                assistantMessageDiv.innerText = 'Error connecting to server. Is the backend running?';
            }
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
